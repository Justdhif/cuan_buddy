name: cuan_buddy_app
description: CuanBuddy - Personal Finance Management App for everyone
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  package_info_plus: ^8.0.0

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.4.0

  # Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # UI / Fonts
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0

  # WebView

  # Image
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  socket_io_client: ^3.1.6
  awesome_snackbar_content: ^0.1.1
  flutter_local_notifications: ^20.1.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.3
  file_picker: ^11.0.2
  share_plus: ^12.0.2
  convex_bottom_bar: ^3.2.0
  emoji_picker_flutter: ^4.4.0
  image_picker: ^1.2.1
  image_cropper: ^12.2.1
  home_widget: ^0.9.2+1
  marquee: ^2.3.0
  record: ^6.2.1
  flutter_colorpicker: ^1.1.0
  pinput: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/launcher_icon.png"
  min_sdk_size: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icon/

dependency_overrides:
  flutter_svg: ^2.2.3
